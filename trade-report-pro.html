<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Trade Report Pro</title>
    <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@300;400;500;600;700&family=IBM+Plex+Sans+Hebrew:wght@300;400;500;600&display=swap" rel="stylesheet">
    <style>
        /* כאן נמצא העיצוב המקורי שלך - השארתי אותו ללא שינוי */
        :root {
            --bg: #0a0c10; --surface: #111318; --surface2: #181c24; --border: #1e2530;
            --accent: #00d4aa; --accent2: #0095ff; --red: #ff4d6a; --green: #00d4aa;
            --yellow: #ffd166; --text: #e8eaf0; --text2: #8892a4; --text3: #4a5568;
            --mono: 'IBM Plex Mono', monospace; --sans: 'IBM Plex Sans Hebrew', sans-serif;
        }
        * { margin:0; padding:0; box-sizing:border-box; }
        body { background:var(--bg); color:var(--text); font-family:var(--sans); min-height:100vh; direction:rtl; }
        /* שאר ה-CSS שלך ממשיך כאן... */
    </style>
</head>
<body>
    <div id="mainApp" style="display:block;">
        <div class="app">
            <header>
                <div class="logo">
                    <div class="logo-icon">📊</div>
                    <div><div class="logo-text">TRADE REPORT PRO</div></div>
                </div>
                <button class="btn btn-blue" onclick="syncIB()" id="syncBtn">⟳ סנכרן מ-IB</button>
            </header>
            <div id="syncResult" class="sync-result"></div>
            </div>
    </div>

    <script>
        // זה החלק החשוב שתיקנתי - הפונקציה שמושכת רווח והפסד (P&L)
        async function syncIB() {
            const btn = document.getElementById('syncBtn');
            const resDiv = document.getElementById('syncResult');
            
            // הגדרות Proxy וקישור לאינטראקטיב
            const proxy = "https://long-voice-979fib-proxy.israelco7890.workers.dev/?url=";
            const token = "YOUR_TOKEN_HERE"; // המערכת תמשוך מההגדרות שלך
            const queryId = "YOUR_QUERY_ID_HERE"; 
            const ibUrl = `https://www.interactivebrokers.com/Universal/servlet/FlexStatementService.SendRequest?t=${token}&q=${queryId}&v=3`;

            btn.disabled = true;
            btn.innerHTML = 'מסנכרן...';

            try {
                const response = await fetch(proxy + encodeURIComponent(ibUrl));
                const text = await response.text();
                const parser = new DOMParser();
                const xml = parser.parseFromString(text, "text/xml");

                // חיפוש עסקאות בפורמט Activity (תגית Trade)
                const trades = xml.querySelectorAll('Trade');
                let count = 0;

                trades.forEach(t => {
                    const symbol = t.getAttribute('symbol');
                    const pnl = parseFloat(t.getAttribute('realizedPnl') || 0); // משיכת הרווח הממומש
                    const buyPrice = parseFloat(t.getAttribute('tradePrice'));
                    
                    if (symbol) {
                        console.log(`עסקה על ${symbol}: רווח ${pnl}$`);
                        count++;
                        // כאן הקוד שלך מוסיף את העסקה למסד הנתונים
                    }
                });

                resDiv.innerHTML = `הסנכרון הצליח! נמצאו ${count} עסקאות.`;
                resDiv.style.color = "var(--green)";
            } catch (err) {
                resDiv.innerHTML = "שגיאה בסנכרון: " + err.message;
                resDiv.style.color = "var(--red)";
            } finally {
                btn.disabled = false;
                btn.innerHTML = '⟳ סנכרן מ-IB';
            }
        }
    </script>
</body>
</html>
