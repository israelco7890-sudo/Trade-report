<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Trade Report Pro</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;600;700&family=Heebo:wght@300;400;600;700;800&display=swap');

  :root {
    --bg: #0d0f14;
    --surface: #141720;
    --surface2: #1c2030;
    --surface3: #232840;
    --border: #2a3050;
    --accent: #00e5ff;
    --accent2: #7c5cfc;
    --green: #00c97a;
    --green-bg: #0a2d1e;
    --green-border: #00c97a40;
    --red: #ff4d6a;
    --red-bg: #2d0a13;
    --red-border: #ff4d6a40;
    --yellow: #ffc04d;
    --text: #e8eaf0;
    --text-muted: #6b7490;
    --text-dim: #9aa0b8;
    --mono: 'IBM Plex Mono', monospace;
    --sans: 'Heebo', sans-serif;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: var(--sans);
    min-height: 100vh;
    direction: rtl;
  }

  /* HEADER */
  .header {
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    padding: 14px 20px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    position: sticky;
    top: 0;
    z-index: 100;
  }
  .logo {
    display: flex;
    align-items: center;
    gap: 10px;
    font-family: var(--mono);
    font-weight: 700;
    font-size: 15px;
    letter-spacing: 2px;
    color: var(--accent);
  }
  .logo-icon {
    width: 32px; height: 32px;
    background: linear-gradient(135deg, var(--accent2), var(--accent));
    border-radius: 8px;
    display: flex; align-items: center; justify-content: center;
    font-size: 16px;
  }
  .account-badge {
    background: var(--surface3);
    border: 1px solid var(--border);
    border-radius: 20px;
    padding: 6px 14px;
    font-size: 12px;
    color: var(--yellow);
    font-family: var(--mono);
    font-weight: 600;
  }

  /* TABS */
  .tabs {
    display: flex;
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    padding: 0 20px;
  }
  .tab {
    padding: 14px 20px;
    font-size: 13px;
    font-weight: 600;
    color: var(--text-muted);
    cursor: pointer;
    border-bottom: 2px solid transparent;
    transition: all 0.2s;
    white-space: nowrap;
  }
  .tab.active {
    color: var(--accent);
    border-bottom-color: var(--accent);
  }

  /* DATE FILTER */
  .date-filter {
    padding: 16px 20px;
    display: flex;
    gap: 8px;
    overflow-x: auto;
    scrollbar-width: none;
    background: var(--surface);
    border-bottom: 1px solid var(--border);
  }
  .date-filter::-webkit-scrollbar { display: none; }
  .filter-btn {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 20px;
    padding: 7px 16px;
    font-size: 12px;
    font-weight: 600;
    color: var(--text-dim);
    cursor: pointer;
    transition: all 0.2s;
    white-space: nowrap;
    font-family: var(--sans);
  }
  .filter-btn.active {
    background: var(--accent);
    border-color: var(--accent);
    color: #000;
  }
  .filter-btn:hover:not(.active) {
    border-color: var(--accent);
    color: var(--accent);
  }

  /* MAIN */
  .main { padding: 16px 20px; max-width: 480px; margin: 0 auto; }

  /* KPI GRID */
  .kpi-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 10px;
    margin-bottom: 16px;
  }
  .kpi-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 14px;
    padding: 16px;
    position: relative;
    overflow: hidden;
  }
  .kpi-card::before {
    content: '';
    position: absolute;
    top: 0; right: 0;
    width: 3px; height: 100%;
    border-radius: 0 14px 14px 0;
  }
  .kpi-card.green::before { background: var(--green); }
  .kpi-card.red::before { background: var(--red); }
  .kpi-card.blue::before { background: var(--accent2); }
  .kpi-card.yellow::before { background: var(--yellow); }
  .kpi-label {
    font-size: 10px;
    font-family: var(--mono);
    color: var(--text-muted);
    letter-spacing: 1px;
    text-transform: uppercase;
    margin-bottom: 8px;
  }
  .kpi-value {
    font-size: 22px;
    font-family: var(--mono);
    font-weight: 700;
    line-height: 1;
    margin-bottom: 4px;
  }
  .kpi-value.green { color: var(--green); }
  .kpi-value.red { color: var(--red); }
  .kpi-value.white { color: var(--text); }
  .kpi-value.yellow { color: var(--yellow); }
  .kpi-sub {
    font-size: 11px;
    color: var(--text-muted);
    font-family: var(--mono);
  }

  /* SECTION TITLE */
  .section-title {
    font-size: 13px;
    font-weight: 700;
    color: var(--text-dim);
    letter-spacing: 1px;
    text-transform: uppercase;
    font-family: var(--mono);
    margin-bottom: 12px;
    margin-top: 20px;
  }

  /* JOURNAL CALENDAR */
  .calendar-nav {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 12px;
  }
  .cal-month {
    font-size: 16px;
    font-weight: 700;
    color: var(--text);
    font-family: var(--mono);
  }
  .cal-arrow {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 8px;
    width: 32px; height: 32px;
    display: flex; align-items: center; justify-content: center;
    cursor: pointer;
    color: var(--text-dim);
    font-size: 14px;
    transition: all 0.2s;
  }
  .cal-arrow:hover { border-color: var(--accent); color: var(--accent); }

  .cal-grid {
    display: grid;
    grid-template-columns: repeat(7, 1fr);
    gap: 3px;
  }
  .cal-header {
    text-align: center;
    font-size: 10px;
    font-family: var(--mono);
    color: var(--text-muted);
    padding: 6px 0;
    font-weight: 600;
  }
  .cal-day {
    aspect-ratio: 1;
    border-radius: 8px;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    font-size: 9px;
    cursor: pointer;
    transition: all 0.15s;
    position: relative;
    min-height: 44px;
    padding: 3px;
  }
  .cal-day.empty { background: transparent; }
  .cal-day.no-trade {
    background: var(--surface2);
    border: 1px solid var(--border);
  }
  .cal-day.no-trade:hover { border-color: var(--text-muted); }
  .cal-day.profit {
    background: var(--green-bg);
    border: 1px solid var(--green-border);
  }
  .cal-day.profit:hover { border-color: var(--green); }
  .cal-day.loss {
    background: var(--red-bg);
    border: 1px solid var(--red-border);
  }
  .cal-day.loss:hover { border-color: var(--red); }
  .cal-day.today {
    box-shadow: 0 0 0 2px var(--accent);
  }
  .day-num {
    font-size: 10px;
    font-weight: 700;
    color: var(--text-dim);
    line-height: 1;
    margin-bottom: 2px;
    font-family: var(--mono);
  }
  .cal-day.profit .day-num { color: var(--green); }
  .cal-day.loss .day-num { color: var(--red); }
  .day-pnl {
    font-size: 8px;
    font-weight: 700;
    font-family: var(--mono);
    line-height: 1;
    text-align: center;
  }
  .cal-day.profit .day-pnl { color: var(--green); }
  .cal-day.loss .day-pnl { color: var(--red); }
  .day-count {
    font-size: 7px;
    color: var(--text-muted);
    font-family: var(--mono);
    margin-top: 1px;
  }

  /* WEEKLY SUMMARY */
  .weekly-list { display: flex; flex-direction: column; gap: 8px; margin-bottom: 20px; }
  .week-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 14px 16px;
    display: flex;
    align-items: center;
    justify-content: space-between;
  }
  .week-label { font-size: 12px; font-weight: 700; color: var(--text-dim); font-family: var(--mono); }
  .week-dates { font-size: 10px; color: var(--text-muted); font-family: var(--mono); margin-top: 2px; }
  .week-trades { font-size: 11px; color: var(--text-muted); margin-top: 2px; }
  .week-pnl {
    font-size: 20px;
    font-weight: 700;
    font-family: var(--mono);
  }
  .week-pnl.green { color: var(--green); }
  .week-pnl.red { color: var(--red); }
  .week-pnl.zero { color: var(--text-muted); }

  /* PANEL */
  .panel { display: none; }
  .panel.active { display: block; }

  /* TRADES TABLE */
  .trades-list { display: flex; flex-direction: column; gap: 8px; }
  .trade-row {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 12px 16px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    cursor: pointer;
    transition: border-color 0.15s;
  }
  .trade-row:hover { border-color: var(--accent2); }
  .trade-symbol { font-size: 14px; font-weight: 700; font-family: var(--mono); color: var(--text); }
  .trade-date { font-size: 10px; color: var(--text-muted); font-family: var(--mono); margin-top: 2px; }
  .trade-side {
    font-size: 9px; font-weight: 700; padding: 2px 8px; border-radius: 4px;
    font-family: var(--mono); letter-spacing: 1px;
  }
  .trade-side.long { background: #0a2d1e; color: var(--green); }
  .trade-side.short { background: #2d0a13; color: var(--red); }
  .trade-pnl { font-size: 16px; font-weight: 700; font-family: var(--mono); text-align: left; }
  .trade-pnl.green { color: var(--green); }
  .trade-pnl.red { color: var(--red); }

  /* NO DATA */
  .no-data {
    text-align: center;
    padding: 40px 20px;
    color: var(--text-muted);
    font-size: 13px;
  }
  .no-data-icon { font-size: 36px; margin-bottom: 12px; }

  /* BOTTOM NAV */
  .bottom-nav {
    position: fixed;
    bottom: 0; left: 0; right: 0;
    background: var(--surface);
    border-top: 1px solid var(--border);
    display: flex;
    padding: 8px 0 20px;
    z-index: 100;
  }
  .nav-item {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 4px;
    padding: 6px;
    cursor: pointer;
    color: var(--text-muted);
    font-size: 10px;
    font-weight: 600;
    transition: color 0.2s;
  }
  .nav-item.active { color: var(--accent); }
  .nav-icon { font-size: 20px; }

  .pb { padding-bottom: 90px; }

  /* SCROLL */
  ::-webkit-scrollbar { width: 4px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }
</style>
</head>
<body>

<div class="header">
  <div class="logo">
    <div class="logo-icon">📊</div>
    TRADE REPORT
  </div>
  <div class="account-badge">⚡ DEMO</div>
</div>

<div class="tabs">
  <div class="tab active" onclick="switchTab('dashboard')">לוח בקרה</div>
  <div class="tab" onclick="switchTab('journal')">יומן</div>
  <div class="tab" onclick="switchTab('trades')">עסקאות</div>
</div>

<!-- ═══════ DASHBOARD PANEL ═══════ -->
<div id="panel-dashboard" class="panel active">
  <div class="date-filter">
    <button class="filter-btn active" onclick="setFilter('week', this)">שבוע</button>
    <button class="filter-btn" onclick="setFilter('month', this)">חודש</button>
    <button class="filter-btn" onclick="setFilter('3m', this)">3 חודשים</button>
    <button class="filter-btn" onclick="setFilter('6m', this)">6 חודשים</button>
    <button class="filter-btn" onclick="setFilter('year', this)">שנה</button>
    <button class="filter-btn" onclick="setFilter('all', this)">הכל</button>
  </div>

  <div class="main pb">
    <div class="kpi-grid" id="kpi-grid">
      <!-- filled by JS -->
    </div>

    <div class="section-title">עסקאות אחרונות</div>
    <div class="trades-list" id="recent-trades">
    </div>
  </div>
</div>

<!-- ═══════ JOURNAL PANEL ═══════ -->
<div id="panel-journal" class="panel">
  <div class="main pb">
    <div class="section-title" style="margin-top:8px">יומן מסחר — מרץ 2026</div>

    <div class="calendar-nav">
      <button class="cal-arrow" onclick="changeMonth(-1)">›</button>
      <div class="cal-month" id="cal-month-label">מרץ 2026</div>
      <button class="cal-arrow" onclick="changeMonth(1)">‹</button>
    </div>

    <div class="cal-grid" id="cal-grid">
      <!-- filled by JS -->
    </div>

    <div class="section-title">סיכום שבועי</div>
    <div class="weekly-list" id="weekly-list">
    </div>
  </div>
</div>

<!-- ═══════ TRADES PANEL ═══════ -->
<div id="panel-trades" class="panel">
  <div class="date-filter">
    <button class="filter-btn active" onclick="setTradeFilter('all', this)">הכל</button>
    <button class="filter-btn" onclick="setTradeFilter('win', this)">רווח ✅</button>
    <button class="filter-btn" onclick="setTradeFilter('loss', this)">הפסד ❌</button>
  </div>
  <div class="main pb">
    <div class="trades-list" id="all-trades-list">
    </div>
  </div>
</div>

<script>
// ──────────────────────────────────────────────
// MOCK DATA — replace with real IB sync later
// ──────────────────────────────────────────────
const allTrades = [
  // March 2026
  { id:1, symbol:'TSLA', date:'2026-03-03', side:'long', pnl: 2950, qty:10 },
  { id:2, symbol:'NVDA', date:'2026-03-04', side:'short', pnl: 4220, qty:5 },
  { id:3, symbol:'AAPL', date:'2026-03-06', side:'long', pnl: 950, qty:15 },
  { id:4, symbol:'SPY',  date:'2026-03-10', side:'long', pnl: 2360, qty:8 },
  { id:5, symbol:'QQQ',  date:'2026-03-11', side:'short', pnl:-675, qty:6 },
  { id:6, symbol:'AMZN', date:'2026-03-12', side:'long', pnl:-1720, qty:4 },
  { id:7, symbol:'META', date:'2026-03-13', side:'long', pnl: 4710, qty:12 },
  { id:8, symbol:'TSLA', date:'2026-03-17', side:'short', pnl:-600, qty:7 },
  { id:9, symbol:'NVDA', date:'2026-03-18', side:'long', pnl:-8120, qty:3 },
  { id:10,symbol:'AAPL', date:'2026-03-19', side:'long', pnl: 3075, qty:9 },
  { id:11,symbol:'SPY',  date:'2026-03-20', side:'short', pnl: 1565, qty:11 },
  { id:12,symbol:'MSFT', date:'2026-03-20', side:'long', pnl: 1565, qty:5 },
  { id:13,symbol:'TSLA', date:'2026-03-24', side:'long', pnl: 6665, qty:14 },
  { id:14,symbol:'NVDA', date:'2026-03-24', side:'short', pnl: 6665, qty:6 },
  { id:15,symbol:'AAPL', date:'2026-03-26', side:'long', pnl: 6030, qty:8 },
  { id:16,symbol:'QQQ',  date:'2026-03-26', side:'long', pnl: 6030, qty:10 },
  { id:17,symbol:'SPY',  date:'2026-03-27', side:'short', pnl: 787, qty:5 },
  { id:18,symbol:'META', date:'2026-03-27', side:'long', pnl: 787, qty:7 },
  { id:19,symbol:'AMZN', date:'2026-03-27', side:'long', pnl: 786, qty:9 },
  // Feb 2026
  { id:20,symbol:'TSLA', date:'2026-02-10', side:'long', pnl: 1200, qty:5 },
  { id:21,symbol:'NVDA', date:'2026-02-14', side:'short', pnl:-450, qty:4 },
  { id:22,symbol:'AAPL', date:'2026-02-19', side:'long', pnl: 2300, qty:8 },
  { id:23,symbol:'SPY',  date:'2026-02-25', side:'long', pnl:-890, qty:6 },
  { id:24,symbol:'META', date:'2026-02-28', side:'short', pnl: 3400, qty:10 },
  // Jan 2026
  { id:25,symbol:'TSLA', date:'2026-01-07', side:'long', pnl: 5500, qty:12 },
  { id:26,symbol:'QQQ',  date:'2026-01-15', side:'short', pnl:-1200, qty:5 },
  { id:27,symbol:'NVDA', date:'2026-01-22', side:'long', pnl: 3800, qty:7 },
  { id:28,symbol:'SPY',  date:'2026-01-29', side:'long', pnl: 2100, qty:9 },
];

const HE_MONTHS = ['ינואר','פברואר','מרץ','אפריל','מאי','יוני','יולי','אוגוסט','ספטמבר','אוקטובר','נובמבר','דצמבר'];
const HE_DAYS = ['ראשון','שני','שלישי','רביעי','חמישי','שישי','שבת'];

let currentFilter = 'week';
let calYear = 2026, calMonth = 2; // 0-indexed March = 2
let tradeFilter = 'all';

// ── Date helpers ──
function today() { return new Date('2026-04-07'); }

function filterTrades(trades, period) {
  const t = today();
  let from = new Date(0);
  if (period === 'week') { from = new Date(t); from.setDate(t.getDate()-7); }
  else if (period === 'month') { from = new Date(t); from.setMonth(t.getMonth()-1); }
  else if (period === '3m') { from = new Date(t); from.setMonth(t.getMonth()-3); }
  else if (period === '6m') { from = new Date(t); from.setMonth(t.getMonth()-6); }
  else if (period === 'year') { from = new Date(t); from.setFullYear(t.getFullYear()-1); }
  return trades.filter(tr => new Date(tr.date) >= from);
}

function fmtMoney(n) {
  const abs = Math.abs(n);
  const s = abs >= 1000 ? '$' + (abs/1000).toFixed(1) + 'K' : '$' + abs.toLocaleString();
  return (n < 0 ? '-' : '+') + s;
}
function fmtMoneyFull(n) {
  const abs = Math.abs(n);
  const s = '$' + abs.toLocaleString();
  return (n < 0 ? '-' : '') + s;
}

// ── KPI ──
function renderKPI() {
  const trades = filterTrades(allTrades, currentFilter);
  const totalPnl = trades.reduce((s,t)=>s+t.pnl,0);
  const wins = trades.filter(t=>t.pnl>0);
  const losses = trades.filter(t=>t.pnl<0);
  const winRate = trades.length ? ((wins.length/trades.length)*100).toFixed(1) : '0';
  const grossWin = wins.reduce((s,t)=>s+t.pnl,0);
  const grossLoss = Math.abs(losses.reduce((s,t)=>s+t.pnl,0));
  const pf = grossLoss ? (grossWin/grossLoss).toFixed(2) : '∞';
  const avgWin = wins.length ? wins.reduce((s,t)=>s+t.pnl,0)/wins.length : 0;
  const avgLoss = losses.length ? losses.reduce((s,t)=>s+t.pnl,0)/losses.length : 0;

  const isPos = totalPnl >= 0;
  document.getElementById('kpi-grid').innerHTML = `
    <div class="kpi-card ${isPos?'green':'red'}">
      <div class="kpi-label">סה"כ P&L</div>
      <div class="kpi-value ${isPos?'green':'red'}">${fmtMoney(totalPnl)}</div>
      <div class="kpi-sub">${trades.length} עסקאות</div>
    </div>
    <div class="kpi-card ${parseFloat(winRate)>=50?'green':'red'}">
      <div class="kpi-label">WIN RATE</div>
      <div class="kpi-value ${parseFloat(winRate)>=50?'green':'red'}">${winRate}%</div>
      <div class="kpi-sub">${wins.length}W / ${losses.length}L</div>
    </div>
    <div class="kpi-card blue">
      <div class="kpi-label">PROFIT FACTOR</div>
      <div class="kpi-value white">${pf}</div>
      <div class="kpi-sub">יחס רווח/הפסד</div>
    </div>
    <div class="kpi-card yellow">
      <div class="kpi-label">ממוצע עסקה</div>
      <div class="kpi-value yellow">${fmtMoney(avgWin)}</div>
      <div class="kpi-sub">הפסד: ${fmtMoneyFull(avgLoss)}</div>
    </div>
  `;

  // recent trades
  const recent = [...trades].sort((a,b)=>new Date(b.date)-new Date(a.date)).slice(0,5);
  document.getElementById('recent-trades').innerHTML = recent.length
    ? recent.map(t=>`
      <div class="trade-row">
        <div>
          <div class="trade-symbol">${t.symbol}</div>
          <div class="trade-date">${t.date}</div>
          <div class="trade-side ${t.side}">${t.side==='long'?'LONG':'SHORT'}</div>
        </div>
        <div class="trade-pnl ${t.pnl>=0?'green':'red'}">${fmtMoney(t.pnl)}</div>
      </div>`).join('')
    : '<div class="no-data"><div class="no-data-icon">📭</div>אין עסקאות בתקופה זו</div>';
}

// ── JOURNAL ──
function renderCalendar() {
  document.getElementById('cal-month-label').textContent = `${HE_MONTHS[calMonth]} ${calYear}`;

  // build day map
  const dayMap = {};
  allTrades.forEach(t => {
    const d = new Date(t.date);
    if (d.getFullYear()===calYear && d.getMonth()===calMonth) {
      const k = d.getDate();
      if (!dayMap[k]) dayMap[k] = { pnl:0, count:0 };
      dayMap[k].pnl += t.pnl;
      dayMap[k].count++;
    }
  });

  const firstDay = new Date(calYear, calMonth, 1).getDay(); // 0=Sun
  const daysInMonth = new Date(calYear, calMonth+1, 0).getDate();
  const t = today();
  const isCurrentMonth = t.getFullYear()===calYear && t.getMonth()===calMonth;

  let html = HE_DAYS.map(d=>`<div class="cal-header">${d.slice(0,1)}</div>`).join('');

  // empty cells
  for(let i=0; i<firstDay; i++) html += `<div class="cal-day empty"></div>`;

  for(let d=1; d<=daysInMonth; d++) {
    const isToday = isCurrentMonth && d===t.getDate();
    const data = dayMap[d];
    let cls = 'no-trade';
    if (data) cls = data.pnl >= 0 ? 'profit' : 'loss';
    if (isToday) cls += ' today';

    const pnlStr = data ? (data.pnl>=0?'+':'')+fmtShort(data.pnl) : '';
    const countStr = data ? `(${data.count})` : '';

    html += `
      <div class="cal-day ${cls}">
        <div class="day-num">${d}</div>
        ${data ? `<div class="day-pnl">${pnlStr}</div><div class="day-count">${countStr}</div>` : ''}
      </div>`;
  }

  document.getElementById('cal-grid').innerHTML = html;
  renderWeekly();
}

function fmtShort(n) {
  const a = Math.abs(n);
  const s = a>=1000 ? (a/1000).toFixed(1)+'K' : a.toString();
  return (n<0?'-':'') + '$'+s;
}

function renderWeekly() {
  // Get all trades for this month grouped by ISO week
  const monthTrades = allTrades.filter(t=>{
    const d=new Date(t.date);
    return d.getFullYear()===calYear && d.getMonth()===calMonth;
  });

  // Build weeks (Sun→Sat)
  const firstDay = new Date(calYear, calMonth, 1);
  const lastDay = new Date(calYear, calMonth+1, 0);
  const weeks = [];
  let wStart = new Date(firstDay);
  // go back to Sunday
  wStart.setDate(wStart.getDate() - wStart.getDay());
  let wNum = 1;
  while (wStart <= lastDay) {
    const wEnd = new Date(wStart); wEnd.setDate(wStart.getDate()+6);
    const wTrades = monthTrades.filter(t=>{
      const d=new Date(t.date);
      return d>=wStart && d<=wEnd;
    });
    const pnl = wTrades.reduce((s,t)=>s+t.pnl,0);
    weeks.push({
      num: wNum++,
      start: fmt(wStart), end: fmt(wEnd),
      pnl, count: wTrades.length
    });
    wStart.setDate(wStart.getDate()+7);
  }

  document.getElementById('weekly-list').innerHTML = weeks.map(w=>`
    <div class="week-card">
      <div>
        <div class="week-label">שבוע ${w.num}</div>
        <div class="week-dates">${w.start} – ${w.end}</div>
        <div class="week-trades">${w.count} עסקאות</div>
      </div>
      <div class="week-pnl ${w.pnl>0?'green':w.pnl<0?'red':'zero'}">${w.count?fmtMoney(w.pnl):'$0'}</div>
    </div>`).join('');
}

function fmt(d) {
  return String(d.getDate()).padStart(2,'0')+'/'+String(d.getMonth()+1).padStart(2,'0');
}

function changeMonth(dir) {
  calMonth += dir;
  if (calMonth < 0) { calMonth=11; calYear--; }
  if (calMonth > 11) { calMonth=0; calYear++; }
  renderCalendar();
}

// ── ALL TRADES ──
function renderAllTrades() {
  let trades = [...allTrades].sort((a,b)=>new Date(b.date)-new Date(a.date));
  if (tradeFilter==='win') trades=trades.filter(t=>t.pnl>0);
  if (tradeFilter==='loss') trades=trades.filter(t=>t.pnl<0);

  document.getElementById('all-trades-list').innerHTML = trades.length
    ? trades.map(t=>`
      <div class="trade-row">
        <div>
          <div class="trade-symbol">${t.symbol}</div>
          <div class="trade-date">${t.date}</div>
          <div class="trade-side ${t.side}">${t.side==='long'?'LONG':'SHORT'}</div>
        </div>
        <div class="trade-pnl ${t.pnl>=0?'green':'red'}">${fmtMoney(t.pnl)}</div>
      </div>`).join('')
    : '<div class="no-data"><div class="no-data-icon">📭</div>אין עסקאות</div>';
}

// ── TABS ──
function switchTab(tab) {
  document.querySelectorAll('.tab').forEach((el,i)=>{
    el.classList.toggle('active', ['dashboard','journal','trades'][i]===tab);
  });
  document.querySelectorAll('.panel').forEach(el=>el.classList.remove('active'));
  document.getElementById('panel-'+tab).classList.add('active');
  if (tab==='journal') renderCalendar();
  if (tab==='trades') renderAllTrades();
}

// ── FILTERS ──
function setFilter(period, btn) {
  currentFilter = period;
  document.querySelectorAll('.date-filter .filter-btn').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  renderKPI();
}
function setTradeFilter(f, btn) {
  tradeFilter = f;
  document.querySelectorAll('#panel-trades .filter-btn').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  renderAllTrades();
}

// ── INIT ──
renderKPI();
</script>
</body>
</html>
