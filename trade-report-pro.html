<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Trading Journal Pro</title>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@300;400;500;600;700&family=IBM+Plex+Sans+Hebrew:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --bg:#0a0c10; --surface:#111318; --surface2:#181c24; --border:#1e2530;
    --accent:#00d4aa; --accent2:#0095ff; --red:#ff4d6a; --green:#00d4aa;
    --yellow:#ffd166; --text:#e8eaf0; --text2:#8892a4; --text3:#4a5568;
    --mono:'IBM Plex Mono',monospace; --sans:'IBM Plex Sans Hebrew',sans-serif;
  }
  *{margin:0;padding:0;box-sizing:border-box;}
  body{background:var(--bg);color:var(--text);font-family:var(--sans);min-height:100vh;direction:rtl;}
  body::before{content:'';position:fixed;inset:0;background-image:linear-gradient(rgba(0,212,170,0.02) 1px,transparent 1px),linear-gradient(90deg,rgba(0,212,170,0.02) 1px,transparent 1px);background-size:40px 40px;pointer-events:none;z-index:0;}

  /* AUTH */
  #authScreen{position:fixed;inset:0;z-index:200;display:flex;align-items:center;justify-content:center;background:var(--bg);}
  .auth-box{background:var(--surface);border:1px solid var(--border);border-radius:20px;padding:48px 40px;width:420px;max-width:95vw;text-align:center;position:relative;overflow:hidden;}
  .auth-box::before{content:'';position:absolute;top:0;left:0;right:0;height:3px;background:linear-gradient(90deg,var(--accent),var(--accent2));}
  .auth-logo{font-family:var(--mono);font-size:22px;font-weight:700;color:var(--accent);letter-spacing:3px;margin-bottom:4px;}
  .auth-sub{font-size:12px;color:var(--text3);font-family:var(--mono);letter-spacing:1px;margin-bottom:36px;}
  .auth-tabs{display:flex;margin-bottom:28px;background:var(--bg);border-radius:8px;padding:3px;}
  .auth-tab{flex:1;padding:9px;background:none;border:none;color:var(--text3);font-family:var(--mono);font-size:12px;border-radius:6px;cursor:pointer;transition:all 0.2s;}
  .auth-tab.active{background:var(--surface2);color:var(--accent);}
  .auth-input-group{margin-bottom:14px;text-align:right;}
  .auth-input-group label{display:block;font-size:10px;color:var(--text3);font-family:var(--mono);letter-spacing:1px;margin-bottom:6px;text-transform:uppercase;}
  .auth-input-group input{width:100%;background:var(--bg);border:1px solid var(--border);border-radius:8px;color:var(--text);font-family:var(--mono);font-size:13px;padding:11px 14px;outline:none;transition:border-color 0.2s;direction:ltr;}
  .auth-input-group input:focus{border-color:var(--accent);}
  .auth-btn{width:100%;padding:13px;background:var(--accent);color:#000;border:none;border-radius:8px;font-family:var(--mono);font-size:14px;font-weight:700;cursor:pointer;margin-top:8px;transition:all 0.2s;letter-spacing:1px;}
  .auth-btn:hover{background:#00b890;transform:translateY(-1px);}
  .auth-error{color:var(--red);font-size:12px;font-family:var(--mono);margin-top:12px;min-height:18px;}

  /* MAIN */
  #mainApp{position:relative;z-index:1;display:none;}
  .app{max-width:1400px;margin:0 auto;padding:16px;}

  header{display:flex;align-items:center;justify-content:space-between;padding:14px 18px;background:var(--surface);border:1px solid var(--border);border-radius:12px;margin-bottom:14px;gap:10px;flex-wrap:wrap;}
  .logo{display:flex;align-items:center;gap:10px;}
  .logo-icon{width:32px;height:32px;background:linear-gradient(135deg,var(--accent),var(--accent2));border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:15px;}
  .logo-text{font-family:var(--mono);font-size:14px;font-weight:700;letter-spacing:2px;color:var(--accent);}
  .logo-sub{font-size:10px;color:var(--text3);font-family:var(--mono);}
  .header-right{display:flex;align-items:center;gap:8px;flex-wrap:wrap;}
  .account-switcher{display:flex;align-items:center;gap:4px;background:var(--surface2);border:1px solid var(--border);border-radius:10px;padding:4px;}
  .acc-btn{padding:6px 14px;border-radius:7px;border:none;font-family:var(--mono);font-size:11px;font-weight:700;cursor:pointer;transition:all 0.2s;background:none;color:var(--text3);letter-spacing:1px;}
  .acc-btn.live.active{background:rgba(0,212,170,0.15);color:var(--green);border:1px solid rgba(0,212,170,0.3);}
  .acc-btn.demo.active{background:rgba(255,209,102,0.15);color:var(--yellow);border:1px solid rgba(255,209,102,0.3);}
  .acc-dot{width:6px;height:6px;border-radius:50%;display:inline-block;margin-left:5px;vertical-align:middle;}
  .acc-dot.live{background:var(--green);animation:pulse 2s infinite;}
  .acc-dot.demo{background:var(--yellow);}
  .user-badge{display:flex;align-items:center;gap:7px;background:var(--surface2);border:1px solid var(--border);border-radius:8px;padding:6px 11px;font-family:var(--mono);font-size:11px;color:var(--text2);}
  .mode-banner{padding:7px 14px;border-radius:8px;font-family:var(--mono);font-size:11px;margin-bottom:12px;display:flex;align-items:center;gap:8px;}
  .mode-banner.live{background:rgba(0,212,170,0.07);border:1px solid rgba(0,212,170,0.2);color:var(--green);}
  .mode-banner.demo{background:rgba(255,209,102,0.07);border:1px solid rgba(255,209,102,0.2);color:var(--yellow);}

  /* NAV */
  nav{display:flex;gap:4px;background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:4px;margin-bottom:14px;overflow-x:auto;}
  nav::-webkit-scrollbar{display:none;}
  .nav-btn{flex:1;min-width:80px;padding:8px 10px;background:none;border:none;color:var(--text2);font-family:var(--sans);font-size:12px;font-weight:500;border-radius:7px;cursor:pointer;transition:all 0.2s;text-align:center;white-space:nowrap;}
  .nav-btn.active{background:var(--surface2);color:var(--accent);border:1px solid var(--border);}
  .nav-btn:hover:not(.active){color:var(--text);}

  /* DATE FILTER */
  .date-filter-bar{display:flex;gap:6px;margin-bottom:14px;flex-wrap:wrap;}
  .df-btn{padding:6px 14px;background:var(--surface2);border:1px solid var(--border);border-radius:20px;font-size:11px;font-weight:600;color:var(--text2);cursor:pointer;transition:all 0.2s;font-family:var(--mono);white-space:nowrap;}
  .df-btn.active{background:var(--accent);border-color:var(--accent);color:#000;}
  .df-btn:hover:not(.active){border-color:var(--accent);color:var(--accent);}

  /* STATS */
  .stats-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(140px,1fr));gap:9px;margin-bottom:14px;}
  .stat-card{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:13px 15px;position:relative;overflow:hidden;}
  .stat-card::before{content:'';position:absolute;top:0;right:0;width:3px;height:100%;background:var(--accent);}
  .stat-card.red::before{background:var(--red);}
  .stat-card.blue::before{background:var(--accent2);}
  .stat-card.yellow::before{background:var(--yellow);}
  .stat-card.purple::before{background:#9b5de5;}
  .stat-label{font-size:9px;color:var(--text3);font-family:var(--mono);letter-spacing:1px;text-transform:uppercase;margin-bottom:5px;}
  .stat-value{font-size:19px;font-weight:700;font-family:var(--mono);}
  .stat-value.green{color:var(--green);} .stat-value.red{color:var(--red);} .stat-value.yellow{color:var(--yellow);}
  .stat-delta{font-size:10px;color:var(--text3);margin-top:3px;font-family:var(--mono);}

  /* PANEL */
  .panel{display:none;} .panel.active{display:block;}
  .card{background:var(--surface);border:1px solid var(--border);border-radius:12px;overflow:hidden;margin-bottom:14px;}
  .card-header{display:flex;align-items:center;justify-content:space-between;padding:13px 18px;border-bottom:1px solid var(--border);}
  .card-title{font-size:12px;font-family:var(--mono);color:var(--text2);letter-spacing:1px;}
  .card-body{padding:18px;}
  .charts-row{display:grid;grid-template-columns:2fr 1fr;gap:12px;margin-bottom:14px;}
  canvas{width:100%!important;max-height:190px;}

  /* SYNC BANNER */
  .sync-banner{background:linear-gradient(135deg,rgba(0,149,255,0.08),rgba(0,212,170,0.08));border:1px solid rgba(0,149,255,0.25);border-radius:12px;padding:14px 18px;margin-bottom:14px;display:flex;align-items:center;justify-content:space-between;gap:12px;flex-wrap:wrap;}
  .sync-banner-text{font-size:13px;color:var(--text2);}
  .sync-banner-text strong{color:var(--accent2);font-family:var(--mono);}
  .sync-status{font-size:11px;color:var(--text3);font-family:var(--mono);margin-top:3px;}

  /* TABLE */
  table{width:100%;border-collapse:collapse;}
  th{padding:9px 12px;text-align:right;font-size:10px;color:var(--text3);font-family:var(--mono);letter-spacing:1px;text-transform:uppercase;border-bottom:1px solid var(--border);white-space:nowrap;}
  td{padding:10px 12px;font-size:12px;font-family:var(--mono);border-bottom:1px solid rgba(30,37,48,0.5);white-space:nowrap;}
  tr:hover td{background:var(--surface2);cursor:pointer;}
  .tag{display:inline-block;padding:2px 7px;border-radius:4px;font-size:10px;font-weight:600;}
  .tag-long{background:rgba(0,212,170,0.15);color:var(--green);}
  .tag-short{background:rgba(255,77,106,0.15);color:var(--red);}
  .tag-open{background:rgba(0,149,255,0.15);color:var(--accent2);}
  .tag-closed{background:rgba(255,209,102,0.12);color:var(--yellow);}
  .pnl-pos{color:var(--green);} .pnl-neg{color:var(--red);}
  .filter-row{display:flex;gap:7px;padding:9px 16px;border-bottom:1px solid var(--border);flex-wrap:wrap;}
  .filter-row input,.filter-row select{padding:6px 9px;font-size:11px;width:auto;}
  .scrollable{overflow-x:auto;}
  .summary-bar{display:flex;gap:16px;padding:9px 18px;background:var(--bg);border-top:1px solid var(--border);font-family:var(--mono);font-size:10px;color:var(--text3);}
  .summary-bar span{color:var(--text2);}
  .empty-state{text-align:center;padding:48px 20px;color:var(--text3);}
  .empty-icon{font-size:34px;margin-bottom:9px;}
  .empty-text{font-family:var(--mono);font-size:12px;}

  /* FORMS */
  .form-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(175px,1fr));gap:11px;margin-bottom:13px;}
  .form-group{display:flex;flex-direction:column;gap:5px;}
  label{font-size:10px;color:var(--text3);font-family:var(--mono);letter-spacing:0.5px;text-transform:uppercase;}
  input,select,textarea{background:var(--bg);border:1px solid var(--border);border-radius:7px;color:var(--text);font-family:var(--mono);font-size:12px;padding:8px 10px;outline:none;transition:border-color 0.2s;direction:ltr;width:100%;}
  input:focus,select:focus,textarea:focus{border-color:var(--accent);}
  select option{background:var(--bg);}
  textarea{resize:vertical;min-height:65px;direction:rtl;font-family:var(--sans);}

  /* BUTTONS */
  .btn{padding:8px 18px;border-radius:8px;border:none;font-family:var(--mono);font-size:12px;font-weight:600;cursor:pointer;letter-spacing:0.5px;transition:all 0.2s;}
  .btn-primary{background:var(--accent);color:#000;}
  .btn-primary:hover{background:#00b890;transform:translateY(-1px);}
  .btn-outline{background:none;border:1px solid var(--border);color:var(--text2);}
  .btn-outline:hover{border-color:var(--accent);color:var(--accent);}
  .btn-blue{background:var(--accent2);color:#fff;}
  .btn-blue:hover{background:#0080dd;transform:translateY(-1px);}
  .btn-danger{background:none;border:1px solid var(--red);color:var(--red);padding:5px 10px;font-size:10px;}
  .btn-danger:hover{background:var(--red);color:#fff;}
  .btn-sm{padding:5px 10px;font-size:10px;}

  /* MODAL */
  .modal-backdrop{position:fixed;inset:0;background:rgba(0,0,0,0.75);z-index:100;display:none;align-items:center;justify-content:center;backdrop-filter:blur(4px);}
  .modal-backdrop.open{display:flex;}
  .modal{background:var(--surface);border:1px solid var(--border);border-radius:16px;padding:26px;width:580px;max-width:95vw;max-height:90vh;overflow-y:auto;direction:rtl;}
  .modal-title{font-family:var(--mono);font-size:14px;color:var(--accent);margin-bottom:20px;display:flex;justify-content:space-between;align-items:center;}
  .close-btn{background:none;border:none;color:var(--text3);font-size:18px;cursor:pointer;}
  .close-btn:hover{color:var(--text);}
  .detail-grid{display:grid;grid-template-columns:1fr 1fr;gap:13px;margin-bottom:16px;}
  .detail-item{display:flex;flex-direction:column;gap:3px;}
  .detail-label{font-size:10px;color:var(--text3);font-family:var(--mono);letter-spacing:1px;}
  .detail-val{font-size:13px;font-family:var(--mono);color:var(--text);}
  .notes-box{background:var(--bg);border:1px solid var(--border);border-radius:8px;padding:11px;font-size:12px;color:var(--text2);line-height:1.6;margin-top:9px;min-height:48px;}

  /* IB SETTINGS */
  .ib-profile{background:var(--bg);border:1px solid var(--border);border-radius:10px;padding:18px;margin-bottom:14px;}
  .ib-profile-title{font-family:var(--mono);font-size:12px;margin-bottom:14px;display:flex;align-items:center;gap:8px;font-weight:600;}
  .ib-profile-title.live{color:var(--green);}
  .ib-profile-title.demo{color:var(--yellow);}
  .ib-row{display:flex;flex-direction:column;gap:5px;margin-bottom:11px;}
  .ib-note{font-size:11px;color:var(--text3);margin-top:8px;line-height:1.7;}
  .ib-note a{color:var(--accent2);text-decoration:none;}
  .sync-result{margin-top:10px;padding:10px 12px;border-radius:8px;font-family:var(--mono);font-size:11px;display:none;}
  .sync-result.success{background:rgba(0,212,170,0.1);border:1px solid rgba(0,212,170,0.3);color:var(--green);}
  .sync-result.error{background:rgba(255,77,106,0.1);border:1px solid rgba(255,77,106,0.3);color:var(--red);}

  /* JOURNAL CALENDAR */
  .cal-nav{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px;}
  .cal-month-label{font-family:var(--mono);font-size:15px;font-weight:700;color:var(--text);}
  .cal-arrow{background:var(--surface2);border:1px solid var(--border);border-radius:8px;width:32px;height:32px;display:flex;align-items:center;justify-content:center;cursor:pointer;color:var(--text2);font-size:15px;transition:all 0.2s;}
  .cal-arrow:hover{border-color:var(--accent);color:var(--accent);}
  .cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:3px;margin-bottom:18px;}
  .cal-hdr{text-align:center;font-size:9px;font-family:var(--mono);color:var(--text3);padding:6px 0;font-weight:600;}
  .cal-day{border-radius:8px;display:flex;flex-direction:column;align-items:center;justify-content:center;font-size:9px;cursor:pointer;transition:all 0.15s;position:relative;min-height:46px;padding:3px;}
  .cal-day.empty{background:transparent;pointer-events:none;}
  .cal-day.no-trade{background:var(--surface2);border:1px solid var(--border);}
  .cal-day.no-trade:hover{border-color:var(--text3);}
  .cal-day.profit{background:rgba(0,212,170,0.1);border:1px solid rgba(0,212,170,0.3);}
  .cal-day.profit:hover{border-color:var(--green);}
  .cal-day.loss{background:rgba(255,77,106,0.1);border:1px solid rgba(255,77,106,0.3);}
  .cal-day.loss:hover{border-color:var(--red);}
  .cal-day.today{box-shadow:0 0 0 2px var(--accent2);}
  .day-num{font-size:10px;font-weight:700;color:var(--text3);line-height:1;margin-bottom:2px;font-family:var(--mono);}
  .cal-day.profit .day-num{color:var(--green);}
  .cal-day.loss .day-num{color:var(--red);}
  .day-pnl{font-size:8px;font-weight:700;font-family:var(--mono);line-height:1;text-align:center;}
  .cal-day.profit .day-pnl{color:var(--green);}
  .cal-day.loss .day-pnl{color:var(--red);}
  .day-count{font-size:7px;color:var(--text3);font-family:var(--mono);margin-top:1px;}

  /* WEEKLY */
  .weekly-list{display:flex;flex-direction:column;gap:8px;margin-bottom:20px;}
  .week-card{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:13px 16px;display:flex;align-items:center;justify-content:space-between;}
  .week-lbl{font-size:12px;font-weight:700;color:var(--text2);font-family:var(--mono);}
  .week-dates{font-size:10px;color:var(--text3);font-family:var(--mono);margin-top:2px;}
  .week-trades-txt{font-size:11px;color:var(--text3);margin-top:2px;}
  .week-pnl{font-size:20px;font-weight:700;font-family:var(--mono);}
  .week-pnl.green{color:var(--green);}
  .week-pnl.red{color:var(--red);}
  .week-pnl.zero{color:var(--text3);}

  .spinner{display:inline-block;width:13px;height:13px;border:2px solid rgba(0,212,170,0.3);border-top-color:var(--accent);border-radius:50%;animation:spin 0.8s linear infinite;vertical-align:middle;margin-left:5px;}
  @keyframes spin{to{transform:rotate(360deg);}}
  @keyframes pulse{0%,100%{opacity:1}50%{opacity:0.3}}
  @media(max-width:768px){.app{padding:8px;}.stats-grid{grid-template-columns:1fr 1fr;}.charts-row{grid-template-columns:1fr;}header{flex-direction:column;}.sync-banner{flex-direction:column;}}
</style>
</head>
<body>

<!-- AUTH -->
<div id="authScreen">
  <div class="auth-box">
    <div class="auth-logo">TRADING JOURNAL PRO</div>
    <div class="auth-sub">PRO · יומן מסחר מקצועי</div>
    <div id="loginForm">
      <div class="auth-input-group"><label>אימייל</label><input type="email" id="loginEmail" placeholder="trader@email.com"></div>
      <div class="auth-input-group"><label>סיסמה</label><input type="password" id="loginPass" placeholder="••••••••" onkeydown="if(event.key==='Enter')window._doLogin()"></div>
      <button class="auth-btn" onclick="window._doLogin()">כניסה →</button>
    </div>
    <div id="registerForm" style="display:none">
      <div class="auth-input-group"><label>אימייל</label><input type="email" id="regEmail" placeholder="trader@email.com"></div>
      <div class="auth-input-group"><label>סיסמה (מינימום 6 תווים)</label><input type="password" id="regPass" placeholder="••••••••" onkeydown="if(event.key==='Enter')window._doRegister()"></div>
      <button class="auth-btn" onclick="window._doRegister()">צור חשבון →</button>
    </div>
    <div class="auth-tabs" style="margin-top:16px">
      <button class="auth-tab active" onclick="window._switchTab('login',this)">התחברות</button>
      <button class="auth-tab" onclick="window._switchTab('register',this)">הרשמה</button>
    </div>
    <div class="auth-error" id="authError"></div>
  </div>
</div>

<!-- MAIN APP -->
<div id="mainApp">
<div class="app">

  <header>
    <div class="logo">
      <div class="logo-icon">📊</div>
      <div><div class="logo-text">TRADING JOURNAL PRO</div><div class="logo-sub">יומן מסחר מקצועי</div></div>
    </div>
    <div class="header-right">
      <div class="account-switcher">
        <button class="acc-btn live active" id="liveModeBtn" onclick="switchAccount('live')"><span class="acc-dot live"></span> LIVE</button>
        <button class="acc-btn demo" id="demoModeBtn" onclick="switchAccount('demo')"><span class="acc-dot demo"></span> DEMO</button>
      </div>
      <div class="user-badge" id="userEmailBadge">טוען...</div>
      <button class="btn btn-outline btn-sm" onclick="doLogout()">יציאה</button>
    </div>
  </header>

  <div class="mode-banner live" id="modeBanner">🟢 מצב LIVE — עסקאות חשבון אמיתי</div>

  <nav>
    <button class="nav-btn active" onclick="showPanel('dashboard',this)">📈 לוח בקרה</button>
    <button class="nav-btn" onclick="showPanel('journal',this)">📅 יומן</button>
    <button class="nav-btn" onclick="showPanel('trades',this)">📋 עסקאות</button>
    <button class="nav-btn" onclick="showPanel('analytics',this)">🔬 ניתוח</button>
    <button class="nav-btn" onclick="showPanel('settings',this)">⚙️ הגדרות</button>
  </nav>

  <!-- DATE FILTER (global) -->
  <div class="date-filter-bar" id="dateFilterBar">
    <button class="df-btn active" onclick="setDateFilter('week',this)">שבוע</button>
    <button class="df-btn" onclick="setDateFilter('month',this)">חוד
